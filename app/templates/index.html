<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Intelligence System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(5deg); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 30px rgba(99, 102, 241, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .upload-text {
            color: var(--text-secondary);
        }

        .upload-text strong {
            color: var(--primary-light);
        }

        .file-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .file-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(99, 102, 241, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--primary-light);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            width: 100%;
            margin-top: 1.25rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .response-box {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 100px;
            position: relative;
        }

        .response-content {
            white-space: pre-wrap;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .response-content.loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .response-content.error {
            color: var(--error);
        }

        .response-content.success {
            color: var(--success);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .toast.error {
            background: var(--error);
            color: white;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 1rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.75rem; }
            .container { padding: 1rem; }
            .card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h1>RAG Intelligence</h1>
            </div>
            <p class="tagline">AI-Powered Document Q&A System</p>
        </header>

        <div class="upload-section">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">📄</div>
                    <h2>Upload Documents</h2>
                </div>
                
                <div class="upload-area" id="upload-area">
                    <input type="file" id="file-input" multiple accept=".pdf,.txt,.md">
                    <div class="upload-icon">📎</div>
                    <div class="upload-text">
                        <strong>Click to upload</strong> or drag and drop<br>
                        PDF, TXT, or MD files
                    </div>
                </div>
                
                <div class="file-list" id="file-list"></div>
                
                <button class="btn btn-primary" id="upload-btn" disabled>
                    <span>📤</span> Upload & Process
                </button>

                <div class="status-bar" id="upload-status" style="display: none;">
                    <div class="status-dot"></div>
                    <span>Processing documents...</span>
                </div>
            </div>
        </div>

        <div class="query-section">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">💬</div>
                    <h2>Ask Questions</h2>
                </div>
                
                <textarea 
                    id="question-input" 
                    placeholder="Ask anything about your uploaded documents..."
                ></textarea>
                
                <button class="btn btn-primary" id="submit-question">
                    <span>🔍</span> Ask Question
                </button>
            </div>
        </div>

        <div class="response-section">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon">💡</div>
                    <h2>Response</h2>
                </div>
                
                <div class="response-box">
                    <div class="response-content" id="response-content">
                        Your response will appear here...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const fileList = document.getElementById('file-list');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');
        const questionInput = document.getElementById('question-input');
        const submitQuestion = document.getElementById('submit-question');
        const responseContent = document.getElementById('response-content');
        const toast = document.getElementById('toast');

        let selectedFiles = [];

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(f => 
                f.name.endsWith('.pdf') || f.name.endsWith('.txt') || f.name.endsWith('.md')
            );
            
            if (selectedFiles.length === 0) {
                showToast('Please upload PDF, TXT, or MD files', 'error');
                return;
            }

            renderFileList();
            uploadBtn.disabled = selectedFiles.length === 0;
        }

        function renderFileList() {
            fileList.innerHTML = selectedFiles.map((file, i) => `
                <div class="file-tag">
                    <span>📄</span>
                    ${file.name}
                </div>
            `).join('');
        }

        // Upload handler
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('file', file);
            });

            uploadBtn.disabled = true;
            uploadStatus.style.display = 'flex';
            responseContent.classList.add('loading');
            responseContent.textContent = 'Uploading and processing documents...';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.message) {
                    showToast(result.message, 'success');
                    responseContent.classList.remove('loading');
                    responseContent.classList.add('success');
                    responseContent.textContent = result.message;
                    selectedFiles = [];
                    fileList.innerHTML = '';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast(error.message || 'Error uploading files', 'error');
                responseContent.classList.remove('loading');
                responseContent.classList.add('error');
                responseContent.textContent = error.message;
            } finally {
                uploadBtn.disabled = selectedFiles.length === 0;
                uploadStatus.style.display = 'none';
            }
        });

        // Query handler
        submitQuestion.addEventListener('click', async () => {
            const question = questionInput.value.trim();
            if (!question) return;

            submitQuestion.disabled = true;
            responseContent.classList.add('loading');
            responseContent.textContent = 'Thinking...';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const result = await response.json();
                
                responseContent.classList.remove('loading');
                
                if (result.response) {
                    responseContent.classList.add('success');
                    responseContent.textContent = result.response;
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                responseContent.classList.remove('loading');
                responseContent.classList.add('error');
                responseContent.textContent = error.message || 'Error getting response';
                showToast(error.message || 'Error getting response', 'error');
            } finally {
                submitQuestion.disabled = false;
            }
        });

        // Also handle Enter key in textarea
        questionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                submitQuestion.click();
            }
        });

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
    </script>
</body>
</html>
