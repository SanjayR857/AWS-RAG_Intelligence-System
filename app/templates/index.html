<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --primary-light: #fb923c;
            --primary-50: #fff7ed;
            --primary-100: #ffedd5;
            --white: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --success: #16a34a;
            --error: #dc2626;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-orange: 0 4px 14px rgba(249, 115, 22, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #fff7ed 0%, #ffffff 50%, #ffedd5 100%);
            min-height: 100vh;
            color: #1f2937;
        }

        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(251, 146, 60, 0.12) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            animation: float2 25s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: var(--shadow-orange);
            animation: pulse-shadow 3s ease-in-out infinite;
        }

        @keyframes pulse-shadow {
            0%, 100% { box-shadow: var(--shadow-orange); }
            50% { box-shadow: 0 8px 25px rgba(249, 115, 22, 0.4); }
        }

        .brand h1 {
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.025em;
        }

        .brand p {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .chat-container {
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.15s both;
            border: 1px solid #e5e7eb;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
        }

        .bot-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
            box-shadow: var(--shadow-orange);
        }

        .bot-details h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #111827;
        }

        .bot-details span {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #ecfccb;
            border: 1px solid #bbf7d0;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #16a34a;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .chat-messages {
            height: 450px;
            overflow-y: auto;
            padding: 1.5rem;
            background: #f9fafb;
        }

        .messages-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
            animation: messageSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
        }

        .content {
            padding: 1rem 1.25rem;
            border-radius: 20px;
            font-size: 0.9375rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .content {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.bot .content {
            background: var(--white);
            border: 1px solid #e5e7eb;
            color: #1f2937;
            border-bottom-left-radius: 6px;
        }

        .message.bot .content.error {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }

        .typing-indicator {
            display: flex;
            gap: 0.375rem;
            padding: 1rem 1.25rem;
            background: var(--white);
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .input-wrapper {
            padding: 1.25rem;
            background: var(--white);
            border-top: 1px solid #e5e7eb;
        }

        .file-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            min-height: 0;
            transition: all 0.3s ease;
        }

        .file-chips.has-files {
            min-height: 40px;
        }

        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 9999px;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #ea580c;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 18px;
            transition: all 0.3s ease;
        }

        .input-row:focus-within {
            border-color: #f97316;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #1f2937;
            font-family: inherit;
            font-size: 0.9375rem;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 100px;
            line-height: 1.5;
        }

        textarea::placeholder { color: #9ca3af; }

        .input-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.3s ease;
        }

        .attach-btn {
            background: var(--white);
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }

        .attach-btn:hover {
            background: #fff7ed;
            border-color: #f97316;
            color: #ea580c;
        }

        .send-btn {
            background: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            color: white;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-orange);
        }

        .input-hint {
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.75rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            padding: 0.875rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.875rem;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #16a34a; color: white; }
        .toast.error { background: #dc2626; color: white; }

        @media (max-width: 640px) {
            .container { padding: 1.5rem 1rem; }
            .logo { width: 48px; height: 48px; font-size: 1.25rem; }
            .brand h1 { font-size: 1.5rem; }
            .chat-messages { height: 380px; }
            .message { max-width: 92%; }
        }
    </style>
</head>
<body>
    <div class="page-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fas fa-sparkles"></i>
                </div>
                <div class="brand">
                    <h1>RAG Intelligence</h1>
                    <p>Your AI Document Assistant</p>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="chat-topbar">
                <div class="bot-info">
                    <div class="bot-avatar">
                        <i class="fas fa-sparkles"></i>
                    </div>
                    <div class="bot-details">
                        <h2>AI Assistant</h2>
                        <span>Powered by LLM</span>
                    </div>
                </div>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Online
                </div>
            </div>

            <div class="chat-messages">
                <div class="messages-wrapper" id="messages">
                    <div class="message bot">
                        <div class="avatar">
                            <i class="fas fa-sparkles"></i>
                        </div>
                        <div class="content">Hello! I'm your AI document assistant. Upload your documents and ask me anything about them.</div>
                    </div>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="file-chips" id="fileChips"></div>
                <div class="input-row">
                    <input type="file" id="fileInput" multiple accept=".pdf,.txt,.md" hidden>
                    <textarea id="input" placeholder="Type your message..." rows="1"></textarea>
                    <div class="input-actions">
                        <button class="action-btn attach-btn" id="attachBtn" title="Attach files">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <button class="action-btn send-btn" id="sendBtn" title="Send">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="input-hint">Press <strong>Enter</strong> to send • <strong>Shift + Enter</strong> for new line</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const fileChips = document.getElementById('fileChips');
        const toast = document.getElementById('toast');

        let files = [];

        function addMessage(text, isUser = false, isError = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            const icon = isUser ? 'fa-user' : 'fa-lightbulb';
            div.innerHTML = `
                <div class="avatar">
                    <i class="fas ${icon}"></i>
                </div>
                <div class="content${isError ? ' error' : ''}">${text}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'typing';
            div.innerHTML = `
                <div class="avatar">
                    <i class="fas fa-sparkles"></i>
                </div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typing')?.remove();
        }

        function renderFiles() {
            fileChips.innerHTML = files.map(f => `
                <div class="file-chip">
                    <i class="fas fa-file-alt"></i>
                    ${f.name}
                </div>
            `).join('');
            fileChips.classList.toggle('has-files', files.length > 0);
        }

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', e => {
            const valid = Array.from(e.target.files).filter(f =>
                f.name.endsWith('.pdf') || f.name.endsWith('.txt') || f.name.endsWith('.md')
            );
            if (valid.length) {
                files = [...files, ...valid];
                renderFiles();
                showToast(`${valid.length} file(s) attached`, 'success');
            }
        });

        async function uploadFiles() {
            if (!files.length) return;
            
            addMessage(`Uploading ${files.length} file(s)...`, true);
            const formData = new FormData();
            files.forEach(f => formData.append('file', f));

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.message) {
                    addMessage(data.message, false);
                    files = [];
                    renderFiles();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                addMessage(err.message || 'Upload failed', false, true);
            }
        }

        async function askQuestion() {
            const q = input.value.trim();
            if (!q) return;

            input.value = '';
            addMessage(q, true);
            showTyping();

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });
                const data = await res.json();
                
                hideTyping();
                
                if (data.response) {
                    addMessage(data.response, false);
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                hideTyping();
                addMessage(err.message || 'Something went wrong', false, true);
            }
        }

        sendBtn.addEventListener('click', async () => {
            if (files.length > 0) {
                await uploadFiles();
                files = [];
                renderFiles();
            }
            await askQuestion();
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        function showToast(msg, type) {
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
